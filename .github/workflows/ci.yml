name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast lane: the pure planner/geometry crates, no native qpdf build.
  pure:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p vgdi-types -p vgdi-engine

  # Spike-0 feasibility gate: vendored qpdf must static-link and the placement primitive must
  # run + stay deterministic on all three OSes. A failure here (esp. Windows MSVC) is the
  # trigger to evaluate the pure-Rust lopdf path BEFORE scheme work (SPEC §16 / ADR-0001).
  spike0:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # bindgen needs libclang.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - if: runner.os == 'Windows'
        run: choco install llvm --no-progress -y
      - if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
      - run: cargo run -p spike0-qpdf --release
      - run: cargo test -p vgdi-engine --features qpdf-backend

  # Enforce the §3 permissive-only license policy.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources

  fmt-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - run: cargo clippy --workspace --all-features -- -D warnings
