# cargo-deny — enforces the §3 permissive-only dependency policy in CI.
# Fails the build if any copyleft (GPL/AGPL/LGPL) license enters the graph.
[graph]
all-features = true

[licenses]
# Allowed: maximally-permissive set only (SPEC §3).
allow = [
    "0BSD",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
]
confidence-threshold = 0.9
# qpdf bundles a notice-bearing MD5 implementation; record it in THIRD-PARTY-NOTICES.

[bans]
# Deny known copyleft crates from sneaking in transitively.
deny = []
multiple-versions = "warn"

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
